<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configuración - Enhanced Shogun</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <h1>Configuración de Enhanced Shogun</h1>

        <div class="grid-container">
            <!-- Tarjeta General -->
            <div class="card">
                <h2>General</h2>
                <div class="form-group">
                    <label for="currentUser" class="label-with-icon">
                        Nombre de usuario (tu nombre en el juego o discord)
                        <span class="info-icon"
                            title="Solo sirve para mostrar el nombre del usuario que envía el reporte.">i</span>
                    </label>
                    <input type="text" id="currentUser" placeholder="Introduce tu nombre">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="autoShowChangelog">
                        <span>Abrir las novedades automáticamente tras actualizar la extensión</span>
                    </label>
                </div>
            </div>

            <!-- Tarjeta Espionaje -->
            <div class="card">
                <h2>Reportes de Espionaje</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableSpyReport">
                        <span>Habilitar Webhook</span>
                    </label>
                    <div class="input-container">
                        <label for="spyReportWebhookURL" class="sub-label">URL del Webhook</label>
                        <input type="text" id="spyReportWebhookURL" placeholder="https://discord.com/api/webhooks/...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableDownloadSpyReport">
                        <span>Mostrar botón para descargar reporte (.htm)</span>
                    </label>
                </div>
            </div>

            <!-- Tarjeta Batallas -->
            <div class="card">
                <h2>Reportes de Batalla</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableBattleReport">
                        <span>Habilitar Webhook</span>
                    </label>
                    <div class="input-container">
                        <label for="battleReportWebhookURL" class="sub-label">URL del Webhook</label>
                        <input type="text" id="battleReportWebhookURL"
                            placeholder="https://discord.com/api/webhooks/...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableCopyBattleReport">
                        <span>Mostrar botón para copiar enlace</span>
                    </label>
                </div>
            </div>

            <!-- Tarjeta Ninjutsu -->
            <div class="card">
                <h2>Reportes de misiones Ninjutsu</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableNinjutsuReportPng">
                        <span>Habilitar Webhook (.png)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableNinjutsuReportHtm">
                        <span>Habilitar Webhook (.htm)</span>
                    </label>
                    <div class="input-container">
                        <label for="ninjutsuReportWebhookURL" class="sub-label">URL del Webhook</label>
                        <input type="text" id="ninjutsuReportWebhookURL"
                            placeholder="https://discord.com/api/webhooks/...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableDownloadNinjutsuReportPng">
                        <span>Mostrar botón para descargar reporte (.png)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableDownloadNinjutsuReportHtm">
                        <span>Mostrar botón para descargar reporte (.htm)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="saveBtn">Guardar Configuración</button>
            <button id="changelogBtn" class="secondary-btn">Changelog (v1.3.1)</button>
        </div>

        <div id="status" class="status"></div>
    </div>
    <script src="options.js"></script>
</body>

</html>
